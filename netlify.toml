[build]
  command   = "npm run build:netlify"
  publish   = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Todas as chamadas /api/* são redirecionadas para a Netlify Function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — necessário para o React Router (wouter) funcionar em produção
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["bcryptjs"]
